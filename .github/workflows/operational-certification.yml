name: Production Operational Certification

on:
  deployment_status:
  push:
    branches:
      - main
    paths:
      - "tests/e2e/operational-certification.spec.mjs"
      - ".github/workflows/operational-certification.yml"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production URL to certify"
        required: false
        default: "https://routsify-software.vercel.app"
        type: string

permissions:
  contents: read

concurrency:
  group: production-operational-certification
  cancel-in-progress: false

jobs:
  certify:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production' && (contains(github.event.deployment_status.environment_url, 'vercel.app') || contains(github.event.deployment_status.target_url, 'vercel.app')))
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_BASE_URL: ${{ inputs.base_url || 'https://routsify-software.vercel.app' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_OPERATIONAL_CERTIFICATION: "1"
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}
          fetch-depth: 2

      - name: Authorize one-time certification
        id: gate
        shell: bash
        run: |
          AUTHORIZED=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || git log -1 --pretty=%B | grep -Fq '[certify-production]'; then
            AUTHORIZED=true
          fi
          if [[ "${{ github.event_name }}" == "push" ]] && git diff-tree --no-commit-id --name-only -r HEAD | grep -Evq '^(tests/e2e/operational-certification\.spec\.mjs|\.github/workflows/operational-certification\.yml)$'; then
            AUTHORIZED=false
          fi
          if [[ "$AUTHORIZED" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install application dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci --ignore-scripts --silent

      - name: Install Chromium
        if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run production operational certification
        if: steps.gate.outputs.run == 'true'
        run: npx playwright test tests/e2e/operational-certification.spec.mjs --project=chromium

      - name: Upload certification evidence
        if: ${{ !cancelled() && steps.gate.outputs.run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: operational-certification-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
