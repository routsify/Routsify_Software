name: Playwright Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional deployment URL to test"
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: ${{ inputs.base_url || 'https://routsify-software.vercel.app' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate lockfile for CI
        run: npm install --package-lock-only --ignore-scripts --silent

      - name: Install application dependencies
        run: npm ci --ignore-scripts --silent

      - name: Install Playwright test runner
        run: npm install --no-save --ignore-scripts @playwright/test@latest

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
