name: Apply Holded Daily Hardening

on:
  push:
    branches:
      - release/holded-daily-hardening
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply validated patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/agent/holded-hardening.patch')
          text = path.read_text()
          text = text.replace('error instanceof Error ? "job_failed" : "job_failed"', 'error instanceof Error ? error.message : "job_failed"')
          path.write_text(text)
          PY
          git am .github/agent/holded-hardening.patch
          rm .github/agent/holded-hardening.patch
          rm .github/workflows/apply-holded-hardening.yml
          rmdir .github/agent 2>/dev/null || true
          git add -A
          git commit -m "Retira transporte de parche Holded"
          git push origin HEAD:${{ github.ref_name }}
