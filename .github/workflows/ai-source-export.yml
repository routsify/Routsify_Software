name: AI source export

on:
  push:
    branches:
      - ai/mvp-audit-implementation-20260711
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: routsify-source
          path: .
          include-hidden-files: true
          retention-days: 1
