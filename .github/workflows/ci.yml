name: Routsify CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci --ignore-scripts --silent
      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          cat typecheck.log
          exit $code
      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 1
      - run: npm run validate:platform
      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          cat lint.log
          exit $code
      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: lint-diagnostics
          path: lint.log
          retention-days: 1
      - run: npm run build
