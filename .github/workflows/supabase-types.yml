name: Supabase Type Synchronization

on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-types:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROJECT_REF: wphiurjzkxbkakiozgvf
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Supabase management credential
        id: credential
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "SUPABASE_ACCESS_TOKEN is not configured; automatic type sync is paused." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate database types from the live schema
        if: steps.credential.outputs.available == 'true'
        run: |
          mkdir -p lib
          npx --yes supabase@2 gen types typescript --project-id "$PROJECT_REF" --schema public > lib/database.types.ts

      - name: Create pull request when types changed
        if: steps.credential.outputs.available == 'true'
        shell: bash
        run: |
          if git diff --quiet -- lib/database.types.ts; then
            echo "Database types are already synchronized." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          branch="automation/supabase-types-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add lib/database.types.ts
          git commit -m "chore: synchronize Supabase database types"
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: synchronize Supabase database types" \
            --body "Automated update generated from the live Supabase schema. Review and merge after CI passes."
