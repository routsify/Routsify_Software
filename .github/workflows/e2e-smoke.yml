name: Playwright Smoke

on:
  deployment_status:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Optional deployment URL to test"
        required: false
        type: string

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name != 'deployment_status' || (github.event.deployment_status.state == 'success' && (contains(github.event.deployment_status.environment_url, 'vercel.app') || contains(github.event.deployment_status.target_url, 'vercel.app')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The immutable Vercel deployment URL can be protected even when the
      # canonical production alias is public. deployment_status only fires
      # after the alias has been promoted, so test the URL users actually use.
      E2E_BASE_URL: ${{ inputs.base_url || 'https://routsify-software.vercel.app' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install application dependencies
        run: npm ci --ignore-scripts --silent

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
