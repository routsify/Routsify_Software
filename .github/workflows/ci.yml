name: Routsify CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --ignore-scripts --silent
      - run: npm run typecheck
      - run: npm run validate:platform
      - run: npm run lint
      - run: npm run build
