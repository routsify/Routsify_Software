name: Next.js Bundle Analysis

on:
  schedule:
    - cron: "11 3 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts --silent

      - name: Generate Turbopack bundle analysis
        run: npx next experimental-analyze --output

      - name: Upload analyzer output
        uses: actions/upload-artifact@v7
        with:
          name: next-bundle-analysis-${{ github.run_id }}
          path: .next/diagnostics/analyze/
          retention-days: 14
