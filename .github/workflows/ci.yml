name: Routsify CI

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci --ignore-scripts
      - run: npm run validate:platform
      - run: npm run typecheck
      - run: npm run build
