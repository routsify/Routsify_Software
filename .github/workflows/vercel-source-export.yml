name: Vercel production source export

on:
  push:
    branches:
      - ai/vercel-production-export-20260711
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: routsify-production-source
          path: .
          include-hidden-files: true
          retention-days: 1
